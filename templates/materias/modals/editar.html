<!-- Modal Editar Materia -->
<div class="modal-overlay" id="modalEditarOverlay">
    <div class="modal-content" id="modalEditarMateria">
        <div class="modal-header">
            <h5 class="modal-header-title">Editar Materia</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalEditarOverlay')">×</button>
        </div>
        <form id="formEditarMateria" method="POST">
            {% csrf_token %}
            <div class="modal-body">
                <input type="hidden" id="editarId" name="materia_id">
                <div class="form-group">
                    <label class="form-label">Nombre de la Materia</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="editarNombre" 
                        name="nombre" 
                        placeholder="Ej: Matemáticas"
                        required
                        minlength="3"
                        maxlength="150">
                </div>
                <div class="form-group">
                    <label class="form-label">Descripción</label>
                    <textarea 
                        class="form-control" 
                        id="editarDescripcion" 
                        name="descripcion" 
                        placeholder="Descripción opcional..."
                        maxlength="500"
                        rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="ocultarModal('modalEditarOverlay')">Cancelar</button>
                <button type="submit" class="btn btn-warning" id="btnActualizarMateria">Actualizar</button>
            </div>
        </form>
    </div>
</div>
