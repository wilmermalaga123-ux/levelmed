<!-- Modal Eliminar Usuario -->
<div class="modal-overlay" id="modalEliminarOverlay">
    <div class="modal-content" id="modalEliminar">
        <div class="modal-header">
            <h5 class="modal-header-title" id="modalEstadoTitulo">Cambiar estado de usuario</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalEliminarOverlay')">×</button>
        </div>
        <div class="modal-body">
            <p>¿Estás seguro de que deseas <strong id="accionEstadoTexto">desactivar</strong> al usuario <strong id="eliminarNombre"></strong>?</p>
            <p class="text-muted"><small id="estadoDescripcion">Podrás revertir esta acción en cualquier momento.</small></p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="ocultarModal('modalEliminarOverlay')">Cancelar</button>
            <button type="button" class="btn btn-warning" id="btnConfirmarEliminar">Desactivar Usuario</button>
        </div>
    </div>
</div>
