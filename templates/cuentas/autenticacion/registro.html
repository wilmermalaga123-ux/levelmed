<!-- Modal de Registro -->
<div id="registro-modal" class="modal">
  <div class="modal__content">
    <span class="modal__close" id="close-registro-modal">&times;</span>
    <h2>Registro de Estudiante</h2>
    <form method="post" action="/registro/" novalidate id="registro-modal-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="registro-email">Correo electrónico</label>
        <input 
          type="email" 
          id="registro-email" 
          name="email" 
          placeholder="correo@ejemplo.com"
          required 
          maxlength="254"
          data-next="registro-username"
        />
        <span class="error-message" id="registro-email-error"></span>
      </div>

      <div class="form-group">
        <label for="registro-username">Usuario</label>
        <input 
          type="text" 
          id="registro-username" 
          name="username" 
          placeholder="Tu nombre de usuario"
          maxlength="50"
          data-next="registro-password1"
        />
        <span class="error-message" id="registro-username-error"></span>
      </div>

      <div class="form-group password-group">
        <label for="registro-password1">Contraseña</label>
        <div class="password-wrapper">
          <input 
            type="password" 
            id="registro-password1" 
            name="password1" 
            placeholder="Mínimo 8 caracteres"
            required 
            maxlength="64"
            data-next="registro-password2"
          />
          <button type="button" class="toggle-password" id="toggle-registro-password1" aria-label="Mostrar/ocultar contraseña">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <span class="error-message" id="registro-password1-error"></span>
      </div>

      <div class="form-group password-group">
        <label for="registro-password2">Confirmar contraseña</label>
        <div class="password-wrapper">
          <input 
            type="password" 
            id="registro-password2" 
            name="password2" 
            placeholder="Repite tu contraseña"
            required 
            maxlength="64"
            data-next="registro-submit"
          />
          <button type="button" class="toggle-password" id="toggle-registro-password2" aria-label="Mostrar/ocultar contraseña">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <span class="error-message" id="registro-password2-error"></span>
      </div>

      <button type="submit" id="registro-submit" class="btn btn--primary">Crear cuenta</button>
    </form>
    <div class="modal__links">
      <a href="#" class="js-switch-to-login">Ya tengo cuenta</a>
    </div>
  </div>
</div>
