<!-- Modal Editar Examen -->
<div class="modal-overlay" id="modalEditarOverlay">
    <div class="modal-content" id="modalEditarExamen">
        <div class="modal-header">
            <h5 class="modal-header-title">Editar Examen</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalEditarOverlay')">×</button>
        </div>
        <form id="formEditarExamen">
            <div class="modal-body">
                <input type="hidden" id="editarId">

                <!-- Título -->
                <div class="form-group">
                    <label class="form-label">Título del Examen</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="editarTitulo" 
                        placeholder="Ej: Examen de Matemáticas"
                        minlength="3"
                        maxlength="150"
                        required>
                </div>

                <!-- Materia -->
                <div class="form-group">
                    <label class="form-label">Materia</label>
                    <select class="form-select" id="editarMateria" onchange="cargarTemasEditarExamen()" required>
                        <option value="">Seleccione una materia</option>
                    </select>
                </div>

                <!-- Tema -->
                <div class="form-group">
                    <label class="form-label">Tema</label>
                    <select class="form-select" id="editarTema" required>
                        <option value="">Seleccione un tema</option>
                    </select>
                </div>

                <!-- Descripción -->
                <div class="form-group">
                    <label class="form-label">Descripción</label>
                    <textarea 
                        class="form-control" 
                        id="editarDescripcion" 
                        placeholder="Descripción opcional..."
                        maxlength="500"
                        rows="3"></textarea>
                </div>

                <!-- Duración -->
                <div class="form-group">
                    <label class="form-label">Duración (minutos)</label>
                    <input 
                        type="number" 
                        class="form-control" 
                        id="editarDuracion" 
                        min="1"
                        max="1440"
                        required>
                </div>

                <!-- Activo -->
                <div class="form-group">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="editarActivo">
                        <label class="form-check-label" for="editarActivo">
                            Examen activo
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalEditarOverlay')">
                    Cancelar
                </button>
                <button type="button" class="btn btn-warning" id="btnActualizarExamen">
                    <i class="fas fa-save"></i> Actualizar
                </button>
            </div>
        </form>
    </div>
</div>
