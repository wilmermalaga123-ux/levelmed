<!-- Modal Ver Examen -->
<div class="modal-overlay" id="modalVerOverlay">
    <div class="modal-content" id="modalVerExamen">
        <div class="modal-header">
            <h5 class="modal-header-title">Detalles del Examen</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalVerOverlay')">×</button>
        </div>
        <div class="modal-body">
            <div class="info-row">
                <label>Título:</label>
                <span id="verTitulo"></span>
            </div>

            <div class="info-row">
                <label>Materia:</label>
                <span id="verMateria"></span>
            </div>

            <div class="info-row">
                <label>Tema:</label>
                <span id="verTema"></span>
            </div>

            <div class="info-row">
                <label>Descripción:</label>
                <span id="verDescripcion"></span>
            </div>

            <div class="info-row">
                <label>Duración:</label>
                <span id="verDuracion"></span>
            </div>

            <div class="info-row">
                <label>Total de Preguntas:</label>
                <span id="verTotalPreguntas"></span>
            </div>

            <div class="info-row">
                <label>Premium:</label>
                <span id="verPremium"></span>
            </div>

            <div class="info-row">
                <label>Estado:</label>
                <span id="verEstado"></span>
            </div>

            <div class="info-row">
                <label>Creado:</label>
                <span id="verFechaCreacion"></span>
            </div>

            <div class="info-row">
                <label>Actualizado:</label>
                <span id="verFechaActualizacion"></span>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalVerOverlay')">
                Cerrar
            </button>
        </div>
    </div>
</div>
