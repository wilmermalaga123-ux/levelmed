<!-- Modal Crear Examen -->
<div class="modal-overlay" id="modalCrearOverlay">
    <div class="modal-content" id="modalCrearExamen">
        <div class="modal-header">
            <h5 class="modal-header-title">Crear Nuevo Examen</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalCrearOverlay')">×</button>
        </div>
        <form id="formCrearExamen">
            <div class="modal-body">
                <!-- Título -->
                <div class="form-group">
                    <label class="form-label">Título del Examen</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="crearTitulo" 
                        placeholder="Ej: Examen de Matemáticas"
                        minlength="3"
                        maxlength="150"
                        required>
                </div>

                <!-- Materia -->
                <div class="form-group">
                    <label class="form-label">Materia</label>
                    <select class="form-select" id="crearMateria" onchange="cargarTemasCrearExamen()" required>
                        <option value="">Seleccione una materia</option>
                    </select>
                </div>

                <!-- Tema -->
                <div class="form-group">
                    <label class="form-label">Tema</label>
                    <select class="form-select" id="crearTema" required>
                        <option value="">Seleccione un tema</option>
                    </select>
                </div>

                <!-- Descripción -->
                <div class="form-group">
                    <label class="form-label">Descripción</label>
                    <textarea 
                        class="form-control" 
                        id="crearDescripcion" 
                        placeholder="Descripción opcional..."
                        maxlength="500"
                        rows="3"></textarea>
                </div>

                <!-- Duración -->
                <div class="form-group">
                    <label class="form-label">Duración (minutos)</label>
                    <input 
                        type="number" 
                        class="form-control" 
                        id="crearDuracion" 
                        value="60" 
                        min="1"
                        max="1440"
                        required>
                </div>

                <!-- Activo -->
                <div class="form-group">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="crearActivo" checked>
                        <label class="form-check-label" for="crearActivo">
                            Examen activo
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalCrearOverlay')">
                    Cancelar
                </button>
                <button type="button" class="btn btn-success" id="btnGuardarExamen">
                    <i class="fas fa-save"></i> Guardar
                </button>
            </div>
        </form>
</form>
    </div>
</div>
