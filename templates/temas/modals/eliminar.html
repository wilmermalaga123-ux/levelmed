<!-- Modal Eliminar Tema -->
<div class="modal-overlay" id="modalEliminarOverlay">
    <div class="modal-content" id="modalEliminarTema">
        <div class="modal-header">
            <h5 class="modal-header-title">Eliminar Tema</h5>
            <button type="button" class="modal-close-btn" onclick="cerrarModal('modalEliminarOverlay')">×</button>
        </div>
        <div class="modal-body">
            <p>¿Estás seguro de que deseas eliminar el tema <strong id="nombreTemaEliminar">-</strong>?</p>
            <p class="text-danger"><small>Esta acción no se puede deshacer y eliminará también todo el contenido asociado.</small></p>
            <input type="hidden" id="idTemaEliminar">
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalEliminarOverlay')">Cancelar</button>
            <button type="button" class="btn btn-danger" id="btnEliminarTema">Eliminar Tema</button>
        </div>
    </div>
</div>
