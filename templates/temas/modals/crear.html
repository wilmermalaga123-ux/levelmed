<!-- Modal Crear Tema -->
<div class="modal-overlay" id="modalCrearOverlay">
    <div class="modal-content" id="modalCrearTema">
        <div class="modal-header">
            <h5 class="modal-header-title">Crear Nuevo Tema</h5>
            <button type="button" class="modal-close-btn" onclick="cerrarModal('modalCrearOverlay')">×</button>
        </div>
        <form id="formCrearTema">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Nombre del Tema</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="crearNombre" 
                        name="nombre" 
                        placeholder="Ej: Introducción a la Programación"
                        required
                        minlength="3"
                        maxlength="200">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Materia</label>
                    <select 
                        class="form-control" 
                        id="crearMateria" 
                        name="materia_id"
                        required>
                        <option value="">-- Seleccionar Materia --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Descripción</label>
                    <textarea 
                        class="form-control" 
                        id="crearDescripcion" 
                        name="descripcion" 
                        placeholder="Descripción opcional del tema..."
                        maxlength="500"
                        rows="4"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="crearRequiereSuscripcion" name="requiere_suscripcion">
                        Requiere Suscripción Premium
                    </label>
                    <small style="display: block; margin-top: 0.25rem; color: #6c757d;">Si está marcado, solo usuarios con suscripción premium podrán acceder a este tema</small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalCrearOverlay')">Cancelar</button>
                <button type="submit" class="btn btn-success" id="btnGuardarTema">Crear Tema</button>
            </div>
        </form>
    </div>
</div>
