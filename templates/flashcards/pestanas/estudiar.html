<div id="study" class="tab-content active">
    <div class="study-area">
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="total-cards">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="due-cards">0</div>
                <div class="stat-label">Por Repasar</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="today-cards">0</div>
                <div class="stat-label">Hoy</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="reviewed-cards">0</div>
                <div class="stat-label">Repasadas</div>
            </div>
        </div>
        
        <div class="flashcard-card" id="study-card">
            <div class="flashcard-front">
                <div class="card-category" id="front-category">General</div>
                <div class="card-content" id="front-content">
                    No hay flashcards para repasar. ¡Crea algunas!
                </div>
                <div class="hint">Haz clic para voltear la tarjeta</div>
            </div>
            <div class="flashcard-back">
                <div class="card-category" id="back-category">General</div>
                <div class="card-content" id="back-content">
                    Respuesta de la flashcard.
                </div>
                <div class="hint">Selecciona la dificultad de tu respuesta</div>
            </div>
        </div>
        
        <div class="study-controls">
            <button class="difficulty-btn again" data-difficulty="0">
                <i class="fas fa-redo"></i> Otra vez (0-1 días)
            </button>
            <button class="difficulty-btn hard" data-difficulty="1">
                <i class="fas fa-hard-hat"></i> Difícil (1-3 días)
            </button>
            <button class="difficulty-btn good" data-difficulty="2">
                <i class="fas fa-thumbs-up"></i> Bien (3-7 días)
            </button>
            <button class="difficulty-btn easy" data-difficulty="3">
                <i class="fas fa-star"></i> Fácil (7+ días)
            </button>
        </div>
    </div>
</div>
