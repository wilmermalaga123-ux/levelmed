<!-- Modal Editar Flashcard -->
<div class="modal-overlay" id="modalEditarFlashcardOverlay">
    <div class="modal-content" id="modalEditarFlashcard">
        <div class="modal-header">
            <h5 class="modal-header-title">Editar Flashcard</h5>
            <button type="button" class="modal-close-btn" onclick="cerrarModalMazo('modalEditarFlashcardOverlay')">×</button>
        </div>
        <form id="formEditarFlashcard">
            {% csrf_token %}
            <input type="hidden" id="editar-flashcard-id" name="flashcard_id">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Categoría</label>
                    <input type="text" class="form-control" id="editar-flashcard-categoria" name="categoria" placeholder="Ej: Programación, Historia, Inglés...">
                </div>
                <div class="form-group">
                    <label class="form-label">Pregunta/Frente *</label>
                    <textarea class="form-control" id="editar-flashcard-pregunta" name="pregunta" rows="2" placeholder="Escribe la pregunta o concepto aquí..." required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Respuesta/Reverso *</label>
                    <textarea class="form-control" id="editar-flashcard-respuesta" name="respuesta" rows="2" placeholder="Escribe la respuesta o definición aquí..." required></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cerrarModalMazo('modalEditarFlashcardOverlay')">Cancelar</button>
                <button type="submit" class="btn btn-warning">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
