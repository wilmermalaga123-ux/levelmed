<!-- Modal Eliminar Mazo -->
<div class="modal-overlay" id="modalEliminarMazoOverlay">
    <div class="modal-content" id="modalEliminarMazo">
        <div class="modal-header">
            <h5 class="modal-header-title">Eliminar Mazo</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalEliminarMazoOverlay')">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="eliminarMazoId">
            <div class="alerta-eliminar">
                <p><strong>⚠️ Advertencia:</strong> Esta acción eliminará el mazo y todas sus flashcards asociadas. Esta acción no se puede deshacer.</p>
            </div>
            <div class="info-mazo">
                <p><strong>Nombre:</strong> <span id="eliminarNombreMazo"></span></p>
                <p><strong>Total de flashcards:</strong> <span id="eliminarTotalFlashcards"></span></p>
            </div>
            <p>¿Está seguro que desea eliminar este mazo?</p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="ocultarModal('modalEliminarMazoOverlay')">Cancelar</button>
            <button type="button" class="btn btn-danger" id="btnConfirmarEliminarMazo">Eliminar</button>
        </div>
    </div>
</div>
