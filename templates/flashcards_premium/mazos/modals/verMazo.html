<!-- Modal Ver Mazo -->
<div class="modal-overlay" id="modalVerMazoOverlay">
    <div class="modal-content" id="modalVerMazo">
        <div class="modal-header">
            <h5 class="modal-header-title">Detalles del Mazo</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalVerMazoOverlay')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="detalle-item">
                <label>Nombre:</label>
                <p id="verNombreMazo"></p>
            </div>
            <div class="detalle-item">
                <label>Materia:</label>
                <p id="verMateriaMazo"></p>
            </div>
            <div class="detalle-item">
                <label>Tema:</label>
                <p id="verTemaMazo"></p>
            </div>
            <div class="detalle-item">
                <label>Descripción:</label>
                <p id="verDescripcionMazo"></p>
            </div>
            <div class="detalle-item">
                <label>Total de Flashcards:</label>
                <p id="verTotalFlashcards"></p>
            </div>
            <div class="detalle-item">
                <label>Creado:</label>
                <p id="verCreadoMazo"></p>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="ocultarModal('modalVerMazoOverlay')">Cerrar</button>
        </div>
    </div>
</div>
