<!-- Modal Editar Mazo -->
<div class="modal-overlay" id="modalEditarMazoOverlay">
    <div class="modal-content" id="modalEditarMazo">
        <div class="modal-header">
            <h5 class="modal-header-title">Editar Mazo</h5>
            <button type="button" class="modal-close-btn" onclick="ocultarModal('modalEditarMazoOverlay')">&times;</button>
        </div>
        <div class="modal-body">
            <form id="formEditarMazo">
                <input type="hidden" id="editMazoId" name="mazo_id">
                <div class="form-group">
                    <label for="editNombreMazo">Nombre del Mazo</label>
                    <input type="text" id="editNombreMazo" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="editMateriaMazo">Materia</label>
                    <select id="editMateriaMazo" name="materia_id" onchange="cargarTemasEditarMazo()" required>
                        <option value="">Seleccione una materia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editTemaMazo">Tema</label>
                    <select id="editTemaMazo" name="tema_id" required>
                        <option value="">Seleccione un tema</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editDescripcionMazo">Descripción</label>
                    <textarea id="editDescripcionMazo" name="descripcion" rows="3"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="ocultarModal('modalEditarMazoOverlay')">Cancelar</button>
            <button type="button" class="btn btn-warning" id="btnActualizarMazo">Actualizar</button>
        </div>
    </div>
</div>
