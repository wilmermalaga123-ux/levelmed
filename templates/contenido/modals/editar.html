<!-- Modal Editar Contenido -->
<div class="modal-overlay" id="modalEditarOverlay">
    <div class="modal-content" id="modalEditarContenido">
        <div class="modal-header">
            <h5 class="modal-header-title">Editar Contenido</h5>
            <button type="button" class="modal-close-btn" onclick="cerrarModal('modalEditarOverlay')">×</button>
        </div>
        <form id="formEditar">
            {% csrf_token %}
            <input type="hidden" name="contenido_id" id="editarContenidoId">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Título del contenido / tema *</label>
                    <input type="text" class="form-control" name="titulo" id="editarTitulo" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Descripción del contenido / tema *</label>
                    <textarea class="form-control" name="descripcion" id="editarDescripcion" rows="3" required></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Contenido del tema *</label>
                    <textarea class="form-control" name="contenido_tema" id="editarContenidoTema" rows="5" required></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Nivel/Curso *</label>
                    <input type="text" class="form-control" name="nivel_curso" id="editarNivelCurso" placeholder="Ej: Nivel 1, Curso Básico, etc." required>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Materia *</label>
                            <select class="form-select" name="materia" id="editarMateria" required onchange="cargarTemasEditar()">
                                <option value="">Seleccione una materia</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Tema *</label>
                            <select class="form-select" name="tema" id="editarTema" required>
                                <option value="">Seleccione un tema</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Tipo de contenido</label>
                    <select class="form-select" name="tipo_contenido" id="editarTipoContenido">
                        <option value="universitario">Universitario</option>
                        <option value="postulante">Postulante</option>
                    </select>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Estado</label>
                            <select class="form-select" name="estado" id="editarEstado">
                                <option value="activo">Activo</option>
                                <option value="inactivo">Inactivo</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Publicación</label>
                            <select class="form-select" name="publicacion" id="editarPublicacion">
                                <option value="no_publicado">No Publicado</option>
                                <option value="publicado">Publicado</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Videos</label>
                    <div id="editarVideosContainer">
                        <!-- Se cargará dinámicamente -->
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-primary mt-2" id="btnAgregarVideoEditar">
                        <i class="fas fa-plus"></i> Agregar más video
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cerrarModal('modalEditarOverlay')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
